name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc \
            make \
            pkg-config \
            libssl-dev \
            libseccomp-dev \
            softhsm2 \
            opensc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-pkcs11 cryptography

      - name: Prepare SoftHSM token
        shell: bash
        run: |
          set -e
          source tests/setup-softhsm2.sh
          echo "SOFTHSM2_CONF=$SOFTHSM2_CONF" >> "$GITHUB_ENV"
          echo "PKCS11_MODULE=$PKCS11_MODULE" >> "$GITHUB_ENV"

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run tests (PSK TLS)
        env:
          PKCS11_TEST_TLS: "1"
        run: |
          pytest -q tests

      - name: Run tests (mTLS)
        env:
          PKCS11_TEST_MTLS: "1"
        run: |
          pytest -q tests
